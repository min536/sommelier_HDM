<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소믈리에 주점 | 통합 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine: #862633;
            --wine-deep: #5C1A22;
            --gold: #B8924A;
            --gold-soft: #D4B574;
            --cream: #FAF6F0;
            --paper: #FFFCF7;
            --ink: #1A1A1A;
            --muted: #7A7068;
            --rule: #E8DFD0;
            --rule-strong: #D6CAB3;
            --success: #2D6A4F;
            --success-soft: #E8F0EB;
            --alert: #C53030;
            --alert-soft: #FCEAEA;
            --card-h: 362px;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--cream);
            margin: 0; padding: 28px;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        .serif { font-family: 'Noto Serif KR', serif; }
        .latin { font-family: 'Cormorant Garamond', serif; font-style: italic; }

        /* ───── HEADER ───── */
        .header {
            background: var(--paper);
            border: 1px solid var(--rule);
            border-top: 3px solid var(--wine);
            padding: 26px 32px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .h-brand-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            letter-spacing: 0.25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .h-brand {
            font-family: 'Noto Serif KR', serif;
            font-weight: 900;
            font-size: 26px;
            color: var(--wine-deep);
            letter-spacing: 0.02em;
        }
        .h-kpis { display: flex; gap: 28px; align-items: stretch; }
        .header-actions {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .export-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 18px;
        }
        .export-btn {
            border: 1px solid var(--wine);
            background: var(--wine);
            color: #fff;
            min-height: 42px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 700;
            cursor: pointer;
        }
        .export-btn:hover { background: var(--wine-deep); }
        .reset-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: 8px;
        }
        .reset-btn {
            font-family: 'Pretendard', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: 1px solid var(--rule-strong);
            background: transparent;
            color: var(--muted);
            min-height: 34px;
            padding: 0 12px;
            cursor: pointer;
            transition: border-color 0.15s, color 0.15s, background 0.15s;
        }
        .reset-btn:hover { border-color: var(--alert); color: var(--alert); background: var(--alert-soft); }
        .logout-btn {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-decoration: none;
            border: 1px solid var(--rule-strong);
            padding: 6px 14px;
            white-space: nowrap;
            transition: color 0.15s, border-color 0.15s;
        }
        .logout-btn:hover { color: var(--wine); border-color: var(--wine); }
        .kpi {
            text-align: right;
            padding-left: 28px;
            border-left: 1px solid var(--rule);
            min-width: 140px;
        }
        .kpi-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .kpi-val {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 26px;
            color: var(--wine-deep);
            letter-spacing: 0.01em;
        }
        .kpi-val .krw {
            font-family: 'Pretendard', sans-serif;
            font-size: 12px;
            color: var(--muted);
            margin-left: 4px;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* ───── SECTION TITLE ───── */
        .section {
            display: flex; align-items: baseline; gap: 14px;
            margin: 40px 0 18px;
        }
        .section-num {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: var(--gold);
        }
        .section-title {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--ink);
        }
        .section-rule { flex: 1; height: 1px; background: var(--rule); }
        .section-meta { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--muted); }
        .jump-input {
            font-family: 'Pretendard', sans-serif;
            font-size: 11px;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            color: var(--ink);
            padding: 3px 7px;
            width: 72px;
            text-align: center;
        }
        .jump-input::-webkit-inner-spin-button,
        .jump-input::-webkit-outer-spin-button { -webkit-appearance: none; }
        .jump-input[type=number] { -moz-appearance: textfield; }

        /* ───── SORT TOGGLE ───── */
        .sort-toggle {
            display: flex; gap: 0;
        }
        .sort-btn {
            font-family: 'Pretendard', sans-serif;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 0.04em;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            color: var(--muted);
            padding: 4px 12px;
            cursor: pointer;
            transition: all 0.15s;
        }
        .sort-btn:first-child { border-right: none; }
        .sort-btn.active {
            background: var(--wine);
            color: #fff;
            border-color: var(--wine);
        }
        .sort-btn:not(.active):hover { color: var(--ink); background: var(--cream); }

        /* ───── MENU CARD GRID ───── */
        .menu-group {
            background: var(--paper);
            border: 1px solid var(--rule);
        }
        .menu-group:not(:first-child) {
            margin-top: 22px;
        }
        .menu-group-title {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 14px;
            letter-spacing: 0.22em;
            color: var(--gold);
            text-transform: uppercase;
            padding: 16px 20px 10px;
            border-bottom: 1px solid var(--rule);
        }
        .menu-card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 0;
            padding: 0;
        }
        .menu-card {
            padding: 16px 20px;
            border-bottom: 1px solid var(--rule);
            border-right: 1px solid var(--rule);
            display: flex; flex-direction: column; gap: 10px;
        }
        .menu-card-name {
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
            font-size: 13.5px;
            color: var(--ink);
            line-height: 1.4;
        }
        .menu-card-fields {
            display: grid;
            grid-template-columns: max-content minmax(64px, 1fr) max-content minmax(64px, 1fr);
            align-items: center;
            gap: 8px;
        }
        .menu-card-fields .field-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 10px;
            letter-spacing: 0.15em;
            color: var(--muted);
            text-transform: uppercase;
            flex-shrink: 0;
        }
        .menu-card-fields .input-sm {
            width: 100%;
            min-width: 0;
        }
        .menu-card-apply {
            grid-column: 1 / -1;
            justify-self: end;
            margin-left: 0;
        }

        /* ───── TABLE CARDS ───── */
        #display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 18px;
        }
        .card {
            background: var(--paper);
            border: 1px solid var(--rule);
            padding: 0;
            display: flex; flex-direction: column;
            position: relative;
            scroll-margin-top: 96px;
            height: var(--card-h);
        }
        .card-top {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 14px 20px 12px;
            border-bottom: 1px solid var(--rule);
        }
        .table-num {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--ink);
        }
        .table-num .latin-no {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--gold);
            margin-right: 6px;
            letter-spacing: 0.15em;
        }
        .table-time {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--muted);
        }
        /* Status accent strip */
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; bottom: 0;
            width: 3px; background: var(--gold);
        }
        .card.all-paid::before { background: var(--success); }
        .card.long-stay::before { background: var(--alert); animation: pulse 1.6s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .pill {
            display: inline-block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.2em;
            padding: 3px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            margin-left: 8px;
        }
        .pill-pending { background: #FAF0E0; color: #8A6A2E; }
        .pill-paid    { background: var(--success-soft); color: var(--success); }
        .pill-stay    { background: var(--alert-soft); color: var(--alert); }

        .bill {
            padding: 10px 20px;
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1px solid var(--rule);
        }
        .bill-label {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 12px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
        }
        .bill-amt {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700; font-size: 22px; color: var(--alert);
            letter-spacing: 0.01em;
        }
        .all-paid .bill-amt { color: var(--success); }
        .bill-amt .krw { font-family: 'Pretendard'; font-size: 11px; color: var(--muted); margin-left: 3px; font-weight: 500; letter-spacing: 0.1em; }

        .order-list { padding: 4px 20px 12px; flex: 1; overflow-y: auto; max-height: none; }
        .order-row {
            display: flex; justify-content: space-between; align-items: center;
            gap: 12px;
            padding: 9px 0; border-bottom: 1px dotted var(--rule);
            font-size: 14px;
        }
        .order-row:last-child { border-bottom: none; }
        .order-row.done { opacity: 0.42; }
        .order-name {
            font-weight: 700;
            color: var(--ink);
            font-size: 14.5px;
            line-height: 1.35;
        }
        .order-count {
            display: inline-block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            color: var(--wine);
            padding: 0;
            font-size: 29px;
            letter-spacing: 0.05em;
            margin-left: 8px;
            vertical-align: middle;
        }
        .order-seq {
            display: block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13.5px;
            color: var(--gold);
            white-space: nowrap;
            letter-spacing: 0.06em;
            margin-bottom: 2px;
        }
        .order-row > div:first-child { min-width: 0; flex: 1; }
        .btn-group { display: flex; gap: 5px; flex-shrink: 0; }
        .mini-btn {
            font-family: 'Pretendard', sans-serif;
            white-space: nowrap;
            font-size: 10px;
            font-weight: 600;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            color: var(--ink);
            padding: 4px 6px;
            min-height: 31px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.15s ease;
        }
        .mini-btn:hover { background: var(--cream); }
        .mini-btn.pay { color: var(--wine); border-color: var(--wine); }
        .mini-btn.pay.is-paid { background: var(--success); color: white; border-color: var(--success); }
        .mini-btn.serve { color: var(--ink); }
        .mini-btn.serve.is-done { color: var(--muted); }
        .mini-btn.del { color: var(--muted); padding: 4px 6px; min-width: 31px; }
        .mini-btn.del:hover { color: var(--alert); border-color: var(--alert); }

        .card-foot { padding: 0 20px 14px; margin-top: auto; }
        .clear-btn {
            width: 100%;
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 13px 12px;
            min-height: 46px;
            cursor: pointer;
            letter-spacing: 0.1em;
            font-size: 13px;
            transition: background 0.15s;
        }
        .clear-btn:hover { background: var(--wine-deep); }

        /* ───── MENU PANEL ───── */
        .panel {
            background: var(--paper);
            border: 1px solid var(--rule);
            padding: 0;
        }
        #menu-management-panel {
            background: transparent;
            border: none;
        }
        .cat-tag {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--gold);
            text-transform: uppercase;
        }
        .input-sm {
            width: 100px;
            padding: 8px 10px;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            font-family: 'Pretendard', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
        }
        .input-sm:focus { outline: none; border-color: var(--gold); }
        .btn-save {
            font-family: 'Noto Serif KR', serif;
            background: var(--wine);
            color: var(--paper);
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.08em;
            transition: background 0.15s;
        }
        .btn-save:hover { background: var(--wine-deep); }

        /* ───── FOOTER CREDIT ───── */
        .credit {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--rule);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
        }

        /* ───── WINE TIME ───── */
        .wine-time {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            color: var(--muted);
            padding: 5px 20px 7px;
            letter-spacing: 0.06em;
            border-bottom: 1px solid var(--rule);
        }
        .wine-time.wine-over {
            color: var(--alert);
            font-style: normal;
            font-weight: 700;
            font-size: 12.5px;
        }

        /* ───── REFRESH STATUS ───── */
        .refresh-status {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.12em;
            text-align: right;
            margin: -10px 0 10px;
            min-height: 16px;
        }
        .refresh-status.error { color: var(--alert); }

        /* ───── STICKY CONTROLS ───── */
        .sticky-controls {
            position: -webkit-sticky;
            position: sticky;
            top: 0;
            z-index: 10;
            background: var(--cream);
            border-bottom: 1px solid var(--rule-strong);
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            padding-bottom: 8px;
        }
        .sticky-controls .section {
            margin: 12px 0 0;
        }

        /* ───── TABLE SUMMARY ───── */
        .table-summary {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            color: var(--muted);
            letter-spacing: 0.1em;
            padding: 4px 0 0;
            display: flex;
            flex-wrap: wrap;
        }
        .table-summary .sum-item { white-space: nowrap; }
        .table-summary .sum-alert { color: var(--alert); font-style: normal; font-weight: 700; }

        /* ───── CTRL GROUP ───── */
        .ctrl-group { display: flex; align-items: center; gap: 8px; margin-left: auto; }

        /* ───── VIEW TOGGLE ───── */
        .view-toggle { display: flex; gap: 0; }

        /* ───── SORT DIMMED IN MAP MODE ───── */
        .sort-controls-dimmed { opacity: 0.35; pointer-events: none; }

        /* ───── TABLE MAP ───── */
        #table-map-layout { margin-top: 18px; }
        .table-map-layout {
            display: grid;
            grid-template-columns: 3fr 2fr;
            gap: 18px;
            align-items: start;
        }
        .table-map-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 8px;
            height: var(--card-h);
        }
        .map-tile {
            background: var(--paper);
            border: 1px solid var(--rule-strong);
            padding: 10px 6px;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 66px;
            text-align: center;
            transition: border-color 0.15s, background 0.15s;
        }
        .map-tile:hover { border-color: var(--gold); }
        .map-tile-num {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 17px;
            color: var(--ink);
            line-height: 1;
        }
        .map-tile-status {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            color: var(--muted);
            margin-top: 5px;
            line-height: 1;
        }
        .map-tile.tile-empty { background: var(--cream); }
        .map-tile.tile-empty .map-tile-num { color: var(--muted); }
        .map-tile.tile-overtime { background: var(--alert-soft); border-color: var(--alert); animation: tile-pulse 1.6s ease-in-out infinite; }
        .map-tile.tile-overtime .map-tile-num { color: var(--alert); }
        .map-tile.tile-overtime .map-tile-status { color: var(--alert); font-style: normal; font-weight: 700; }
        @keyframes tile-pulse { 0%,100%{opacity:1} 50%{opacity:0.75} }
        .map-tile.tile-unpaid { background: #FAF0E0; border-color: var(--gold); }
        .map-tile.tile-unpaid .map-tile-status { color: var(--gold); font-style: normal; font-weight: 600; }
        .map-tile.tile-unserved { background: var(--cream); border-color: var(--rule-strong); border-left: 3px solid var(--gold-soft); }
        .map-tile.tile-unserved .map-tile-status { color: var(--gold); font-style: normal; font-weight: 600; }
        .map-tile.tile-paid { background: var(--success-soft); border-color: var(--success); }
        .map-tile.tile-paid .map-tile-num { color: var(--success); }
        .map-tile.tile-paid .map-tile-status { color: var(--success); }
        .map-tile.selected { border: 2px solid var(--wine); }
        #table-map-detail .card.map-selected::before { background: var(--wine); animation: none; }
        .map-selected-banner {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 10px;
            letter-spacing: 0.22em;
            color: var(--wine);
            text-transform: uppercase;
            text-align: center;
            padding: 4px 0 3px;
            background: #FDF4F4;
            border-bottom: 1px solid var(--rule);
        }
        .map-queue-divider {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--muted);
            text-transform: uppercase;
            padding: 10px 0 6px;
            border-top: 1px solid var(--rule);
            margin-top: 14px;
        }
        .map-queue-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 12px;
        }
        .map-queue-grid .card .order-row {
            flex-direction: column;
            align-items: stretch;
            gap: 6px;
        }
        .map-queue-grid .card .order-row > div:first-child {
            display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
        }
        .map-queue-grid .card .order-seq { flex-basis: 100%; }
        .map-queue-grid .card .btn-group { justify-content: flex-end; }
        .table-map-right { overflow-y: auto; max-height: calc(100vh - 130px); }
        .map-empty-state {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 14px;
            color: var(--muted);
            letter-spacing: 0.12em;
            padding: 32px 20px;
            text-align: center;
            border: 1px dashed var(--rule-strong);
        }
        @media (max-width: 720px) {
            .table-map-layout { grid-template-columns: 1fr; }
            .table-map-right { max-height: none; }
            .table-map-grid { gap: 6px; }
            .map-tile { min-height: 54px; }
            .map-tile-num { font-size: 15px; }
            .map-tile-status { font-size: 10px; }
            .map-queue-grid { grid-template-columns: 1fr; }
        }

        /* ───── MOBILE (placed last so it actually overrides) ───── */
        @media (max-width: 720px) {
            body { padding: 14px; }
            .header {
                padding: 20px;
                grid-template-columns: 1fr;
                gap: 16px;
            }
            .h-brand { font-size: 22px; }
            .h-brand-label { font-size: 12px; letter-spacing: 0.22em; }
            .h-kpis { gap: 0; }
            .kpi {
                text-align: left;
                padding-left: 0;
                border-left: none;
                border-top: 1px solid var(--rule);
                padding-top: 14px;
                min-width: 0;
            }
            .kpi-val { font-size: 24px; }
            .section { margin: 28px 0 14px; }
            .section-num { font-size: 18px; }
            .section-title { font-size: 16px; }
            .section-meta { font-size: 11px; }
            #display { grid-template-columns: 1fr; gap: 14px; }
            .card-top { padding: 16px 16px 12px; flex-wrap: wrap; gap: 6px; }
            .table-num { font-size: 16px; }
            .ttime, .table-time { font-size: 12px; }
            .pill { font-size: 10px; padding: 2px 8px; }
            .bill { padding: 12px 16px; }
            .bill-amt { font-size: 18px; }
            .order-list { padding: 4px 16px 12px; }
            .order-row { font-size: 13.5px; gap: 10px; }
            .order-name { font-size: 14px; }
            .order-count { padding: 0; font-size: 28px; }
            .card-foot { padding: 0 16px 16px; }
            .clear-btn { padding: 14px 12px; font-size: 12.5px; min-height: 48px; }
            .mini-btn { padding: 5px 7px; font-size: 10px; min-height: 31px; }
            .mini-btn.del { padding: 5px 6px; min-width: 31px; }

            /* Menu management: single column on mobile */
            .menu-card-grid { grid-template-columns: 1fr; }
            .menu-card { border-right: none; }
            .menu-card-fields .input-sm { width: 100%; }
            .sticky-controls .section { flex-wrap: wrap; row-gap: 6px; }
            .ctrl-group { flex-wrap: wrap; gap: 6px; }
            .sort-btn { font-size: 10px; padding: 3px 8px; }
            .credit { margin-top: 36px; font-size: 11px; letter-spacing: 0.18em; }
            .export-actions { justify-content: stretch; }
            .export-actions .export-btn { width: 100%; }
        }

        @media (max-width: 420px) {
            body { padding: 10px; }
            .header { padding: 18px; }
            .h-brand { font-size: 20px; }
            /* Stack order row vertically when really tight so buttons never wrap */
            .order-row {
                flex-direction: column;
                align-items: stretch;
                gap: 8px;
            }
            .order-row > div:first-child {
                display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center;
            }
            .order-seq { flex-basis: 100%; }
            .btn-group { justify-content: flex-end; }
            .mini-btn { flex: 1; max-width: 90px; text-align: center; }
            .mini-btn.del { flex: 0 0 31px; max-width: 31px; }
        }
    </style>
</head>
<body>

<script>
// 이미지 로드 실패 핸들러 (메뉴 이미지가 깨질 때 우아한 처리)
window.addEventListener('error', function(e){
    if(e.target.tagName !== 'IMG') return;
    e.target.style.display = 'none';
}, true);
</script>

    <div class="header">
        <div>
            <div class="h-brand-label">Sommelier · Operations</div>
            <div class="h-brand">소믈리에 주점 통합 관리</div>
        </div>
        <div class="header-actions">
            <div class="h-kpis">
                <div class="kpi">
                    <div class="kpi-label">Cumulative Revenue</div>
                    <div class="kpi-val"><span id="total-rev">0</span><span class="krw">원</span></div>
                </div>
            </div>
            <a href="{{ url_for('logout') }}" class="logout-btn">로그아웃</a>
        </div>
    </div>

    <div class="sticky-controls">
        <div class="section">
            <span class="section-num">01</span>
            <span class="section-title">테이블 실시간 현황</span>
            <span class="section-rule"></span>
            <span class="section-meta">Live · 20s</span>
            <div class="ctrl-group">
                <div class="view-toggle">
                    <button class="sort-btn active" id="view-cards" onclick="setViewMode('cards')">카드</button>
                    <button class="sort-btn" id="view-map" onclick="setViewMode('map')">맵</button>
                </div>
                <div class="sort-toggle" id="sort-controls">
                    <button class="sort-btn active" id="sort-table" onclick="setSortMode('table')">번호순</button>
                    <button class="sort-btn" id="sort-order" onclick="setSortMode('order')">주문순</button>
                </div>
                <input type="number" class="jump-input" min="1" placeholder="# 이동" title="테이블 번호로 이동" oninput="jumpToTable(this.value)">
            </div>
        </div>
        <div class="refresh-status" id="refresh-status"></div>
        <div class="table-summary" id="table-summary"></div>
    </div>
    <div id="display"></div>

    <div id="table-map-layout" style="display:none">
        <div class="table-map-layout">
            <div class="table-map-left">
                <div class="table-map-grid" id="table-map-grid"></div>
            </div>
            <div class="table-map-right" id="table-map-detail">
                <div class="map-empty-state">왼쪽에서 테이블을 선택하세요.</div>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="section-num">02</span>
        <span class="section-title">메뉴 및 재고 관리</span>
        <span class="section-rule"></span>
        <span class="section-meta">Menu &amp; Stock</span>
        <button class="sort-btn" id="menu-toggle-btn" onclick="toggleMenu()">펼치기</button>
    </div>
    <div class="panel" id="menu-management-panel" style="display:none"></div>

    <div class="export-actions">
        <button class="export-btn" onclick="downloadSales()">판매내역 Excel</button>
    </div>

    <div class="reset-actions">
        <button class="reset-btn" onclick="confirmReset()">테스트 데이터 초기화</button>
    </div>

    <div class="credit">— System designed by 동민 · 창식 —</div>

    <script>
        const REFRESH_INTERVAL_MS = 20000;
        let tableSortMode = 'table';
        let menuExpanded = false;
        let adminViewMode = 'cards';
        let selectedTableId = null;
        let lastTablesData = null;

        function toggleMenu() {
            menuExpanded = !menuExpanded;
            document.getElementById('menu-management-panel').style.display = menuExpanded ? '' : 'none';
            document.getElementById('menu-toggle-btn').textContent = menuExpanded ? '접기' : '펼치기';
        }

        function setViewMode(mode) {
            adminViewMode = mode;
            document.getElementById('view-cards').className = 'sort-btn' + (mode === 'cards' ? ' active' : '');
            document.getElementById('view-map').className = 'sort-btn' + (mode === 'map' ? ' active' : '');
            document.getElementById('display').style.display = mode === 'cards' ? '' : 'none';
            document.getElementById('table-map-layout').style.display = mode === 'map' ? '' : 'none';
            document.getElementById('sort-controls').classList.toggle('sort-controls-dimmed', mode === 'map');
            if (mode === 'map' && lastTablesData) renderMapMode(lastTablesData);
        }

        function setSortMode(mode) {
            tableSortMode = mode;
            document.getElementById('sort-table').className = 'sort-btn' + (mode === 'table' ? ' active' : '');
            document.getElementById('sort-order').className = 'sort-btn' + (mode === 'order' ? ' active' : '');
            refresh();
        }

        const CATEGORY_GROUP = { liquor: 'WINE', food: 'FOOD' };
        function menuGroup(cat) { return CATEGORY_GROUP[cat] || 'ETC'; }

        function escapeHtml(s) {
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        function formatDuration(mins) {
            if (mins < 60) return `${mins}분`;
            const h = Math.floor(mins / 60);
            const m = mins % 60;
            return m === 0 ? `${h}시간` : `${h}시간 ${m}분`;
        }

        function oldestPendingOrderId(tableInfo) {
            const pending = tableInfo.orders.filter(o => o.status !== '서빙 완료');
            return pending.length ? Math.min(...pending.map(o => o.order_id)) : Infinity;
        }

        function computeTableState(id, info) {
            const diffMins = Math.floor((new Date() - new Date(info.entry_time)) / 60000);
            const isAllPaid = info.remaining_bill === 0;
            const wineCount = info.orders.filter(o => o.is_alcohol).length;
            let isLongStay, allowedMins = null;
            if (wineCount >= 1) {
                allowedMins = 100 + (wineCount - 1) * 60;
                isLongStay = diffMins > allowedMins;
            } else {
                isLongStay = diffMins >= 120;
            }
            return {
                diffMins, isAllPaid, wineCount, isLongStay, allowedMins,
                hasUnpaid: info.orders.some(o => !o.is_paid),
                hasUnserved: info.orders.some(o => o.status !== '서빙 완료'),
            };
        }

        function buildTableCardEl(id, info, state) {
            const { diffMins, isAllPaid, wineCount, isLongStay, allowedMins } = state;
            let wineTimeHtml = '';
            if (wineCount >= 1) {
                const allowedStr = formatDuration(allowedMins);
                if (isLongStay) {
                    const overMins = diffMins - allowedMins;
                    wineTimeHtml = `<div class="wine-time wine-over">와인 ${wineCount}병 · 인정 ${allowedStr} · 초과 ${overMins}분</div>`;
                } else {
                    wineTimeHtml = `<div class="wine-time">와인 ${wineCount}병 · 인정 ${allowedStr}</div>`;
                }
            }
            const groupedOrders = info.orders.reduce((acc, o) => {
                const key = `${o.menu_name}_${o.status}_${o.is_paid}`;
                if (!acc[key]) {
                    acc[key] = { ...o, count: 0, orderIds: [], minOrderId: o.order_id, minDisplayTime: o.time };
                } else {
                    acc[key].minOrderId = Math.min(acc[key].minOrderId, o.order_id);
                    acc[key].minDisplayTime = o.time < acc[key].minDisplayTime ? o.time : acc[key].minDisplayTime;
                }
                acc[key].count += 1;
                acc[key].orderIds.push(o.order_id);
                return acc;
            }, {});
            const card = document.createElement('div');
            card.className = `card ${isAllPaid ? 'all-paid' : ''} ${isLongStay ? 'long-stay' : ''}`;
            card.dataset.tableId = id;
            let pill = '';
            if (isLongStay) pill = '<span class="pill pill-stay">Long stay</span>';
            else if (isAllPaid) pill = '<span class="pill pill-paid">Paid</span>';
            else pill = '<span class="pill pill-pending">Pending</span>';
            let html = `
                        <div class="card-top">
                            <div class="table-num"><span class="latin-no">No.</span>${id}번 테이블${pill}</div>
                            <div class="table-time">${formatDuration(diffMins)}</div>
                        </div>
                        <div class="bill">
                            <span class="bill-label">${isAllPaid ? 'Settled' : 'Remaining'}</span>
                            <span class="bill-amt">${info.remaining_bill.toLocaleString()}<span class="krw">원</span></span>
                        </div>
                        ${wineTimeHtml}
                        <div class="order-list">`;
            Object.values(groupedOrders)
                .sort((a, b) => {
                    const doneA = a.status === '서빙 완료';
                    const doneB = b.status === '서빙 완료';
                    if (doneA !== doneB) return doneA ? 1 : -1;
                    return a.minOrderId - b.minOrderId;
                })
                .forEach(group => {
                    const isDone = group.status === '서빙 완료';
                    const idList = JSON.stringify(group.orderIds);
                    html += `
                            <div class="order-row ${isDone?'done':''}">
                                <div>
                                    <span class="order-seq">#${group.minOrderId} · ${group.minDisplayTime}</span>
                                    <span class="order-name">${escapeHtml(group.menu_name)}</span>
                                    <span class="order-count">× ${group.count}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="mini-btn pay ${group.is_paid?'is-paid':''}" onclick='batchProcess("item_pay", "${id}", ${idList})'>
                                        ${group.is_paid?'완료':'입금'}
                                    </button>
                                    <button class="mini-btn serve ${isDone?'is-done':''}" onclick='batchProcess("serve", "${id}", ${idList})'>
                                        ${isDone?'취소':'서빙'}
                                    </button>
                                    <button class="mini-btn del" onclick='batchProcess("cancel", "${id}", ${idList})'>×</button>
                                </div>
                            </div>`;
                });
            html += `</div>
                        <div class="card-foot">
                            <button class="clear-btn" onclick="clearT('${id}')">테이블 비우기 · Clear</button>
                        </div>`;
            card.innerHTML = html;
            return card;
        }

        function getTilePriorityClass(state) {
            if (state.isLongStay) return 'tile-overtime';
            if (state.hasUnpaid) return 'tile-unpaid';
            if (state.hasUnserved) return 'tile-unserved';
            if (state.isAllPaid) return 'tile-paid';
            return 'tile-empty';
        }

        function buildMapTileEl(n, tables) {
            const id = String(n);
            const info = tables[id];
            const tile = document.createElement('div');
            const isSelected = selectedTableId === id;
            if (!info) {
                tile.className = `map-tile tile-empty${isSelected ? ' selected' : ''}`;
                tile.innerHTML = `<span class="map-tile-num">${n}</span>`;
            } else {
                const state = computeTableState(id, info);
                const priorityClass = getTilePriorityClass(state);
                tile.className = `map-tile ${priorityClass}${isSelected ? ' selected' : ''}`;
                let statusText = '';
                if (state.isLongStay) statusText = '초과';
                else if (state.hasUnpaid) statusText = '미입금';
                else if (state.hasUnserved) statusText = formatDuration(state.diffMins);
                else if (state.isAllPaid) statusText = `완료 · ${formatDuration(state.diffMins)}`;
                tile.innerHTML = `<span class="map-tile-num">${n}</span>${statusText ? `<span class="map-tile-status">${escapeHtml(statusText)}</span>` : ''}`;
            }
            tile.onclick = () => selectMapTable(id);
            return tile;
        }

        function renderMapMode(tables) {
            const grid = document.getElementById('table-map-grid');
            grid.innerHTML = '';
            for (let n = 1; n <= 25; n++) {
                grid.appendChild(buildMapTileEl(n, tables));
            }
            renderMapDetail(tables);
        }

        function selectMapTable(id) {
            selectedTableId = id;
            if (lastTablesData) renderMapMode(lastTablesData);
        }

        function renderMapDetail(tables) {
            const detail = document.getElementById('table-map-detail');

            // auto-select by oldest pending order if nothing selected
            if (!selectedTableId) {
                const ids = Object.keys(tables).sort((a, b) => {
                    const minA = oldestPendingOrderId(tables[a]);
                    const minB = oldestPendingOrderId(tables[b]);
                    return minA !== minB ? minA - minB : Number(a) - Number(b);
                });
                if (ids.length) selectedTableId = ids[0];
            }

            detail.innerHTML = '';

            // no active tables at all
            if (!selectedTableId) {
                const empty = document.createElement('div');
                empty.className = 'map-empty-state';
                empty.textContent = '활성 테이블이 없습니다.';
                detail.appendChild(empty);
                return;
            }

            // selected card
            const selInfo = tables[selectedTableId];
            if (!selInfo) {
                const empty = document.createElement('div');
                empty.className = 'map-empty-state';
                empty.textContent = '선택한 테이블에 주문이 없습니다.';
                detail.appendChild(empty);
            } else {
                const state = computeTableState(selectedTableId, selInfo);
                const card = buildTableCardEl(selectedTableId, selInfo, state);
                card.classList.add('map-selected');
                const banner = document.createElement('div');
                banner.className = 'map-selected-banner';
                banner.textContent = '선택 테이블';
                card.insertBefore(banner, card.firstChild);
                detail.appendChild(card);
            }

            // queue: top 2 active tables by oldest pending order, excluding selected
            const queueIds = Object.keys(tables)
                .filter(id => id !== selectedTableId)
                .sort((a, b) => {
                    const minA = oldestPendingOrderId(tables[a]);
                    const minB = oldestPendingOrderId(tables[b]);
                    return minA !== minB ? minA - minB : Number(a) - Number(b);
                })
                .slice(0, 2);

            if (queueIds.length) {
                const divider = document.createElement('div');
                divider.className = 'map-queue-divider';
                divider.textContent = 'Queue';
                detail.appendChild(divider);
                const queueGrid = document.createElement('div');
                queueGrid.className = 'map-queue-grid';
                queueIds.forEach(id => {
                    const state = computeTableState(id, tables[id]);
                    queueGrid.appendChild(buildTableCardEl(id, tables[id], state));
                });
                detail.appendChild(queueGrid);
            }
        }

        function refresh() {
            const _pageX = window.scrollX, _pageY = window.scrollY;
            fetch('/api/orders').then(r => r.json()).then(res => {
                const _rs = document.getElementById('refresh-status');
                _rs.textContent = '';
                _rs.className = 'refresh-status';
                document.getElementById('total-rev').innerText = res.cumulative_revenue.toLocaleString();

                // ── Menu management: grouped card layout ──
                const menuPanel = document.getElementById('menu-management-panel');
                const groups = { WINE: [], FOOD: [], ETC: [] };
                res.menu.forEach(m => { groups[menuGroup(m.category)].push(m); });
                let menuHtml = '';
                ['WINE', 'FOOD', 'ETC'].forEach(g => {
                    if (!groups[g].length) return;
                    menuHtml += `<div class="menu-group"><div class="menu-group-title">${g}</div><div class="menu-card-grid">`;
                    groups[g].forEach(m => {
                        menuHtml += `
                            <div class="menu-card">
                                <div class="menu-card-name">${escapeHtml(m.name)}</div>
                                <div class="menu-card-fields">
                                    <span class="field-label">Price</span>
                                    <input type="number" id="p-${m.id}" class="input-sm" value="${m.price}">
                                    <span class="field-label">Stock</span>
                                    <input type="number" id="s-${m.id}" class="input-sm" value="${m.stock}">
                                    <button class="btn-save menu-card-apply" onclick="updateMenu(${m.id})">APPLY</button>
                                </div>
                            </div>`;
                    });
                    menuHtml += `</div></div>`;
                });
                menuPanel.innerHTML = menuHtml;
                menuPanel.style.display = menuExpanded ? '' : 'none';

                // ── Table cards: sort ──
                const container = document.getElementById('display');
                container.innerHTML = '';

                let activeCount = 0, unpaidCount = 0, unservedCount = 0, overtimeCount = 0;
                let tableIds = Object.keys(res.tables);
                if (tableSortMode === 'order') {
                    tableIds.sort((a, b) => {
                        const minA = oldestPendingOrderId(res.tables[a]);
                        const minB = oldestPendingOrderId(res.tables[b]);
                        if (minA !== minB) return minA - minB;
                        return Number(a) - Number(b);
                    });
                } else {
                    tableIds.sort((a, b) => Number(a) - Number(b));
                }

                tableIds.forEach(id => {
                    const info = res.tables[id];
                    const state = computeTableState(id, info);
                    activeCount++;
                    if (state.hasUnpaid) unpaidCount++;
                    if (state.hasUnserved) unservedCount++;
                    if (state.isLongStay) overtimeCount++;
                    container.appendChild(buildTableCardEl(id, info, state));
                });

                document.getElementById('table-summary').innerHTML = [
                    `<span class="sum-item">활성 테이블 ${activeCount}</span>`,
                    `<span class="sum-item${unpaidCount  > 0 ? ' sum-alert' : ''}"> · 미입금 ${unpaidCount}</span>`,
                    `<span class="sum-item${unservedCount > 0 ? ' sum-alert' : ''}"> · 미서빙 ${unservedCount}</span>`,
                    `<span class="sum-item${overtimeCount > 0 ? ' sum-alert' : ''}"> · 초과 ${overtimeCount}</span>`,
                ].join('');

                lastTablesData = res.tables;
                if (adminViewMode === 'map') renderMapMode(res.tables);

                window.scrollTo(_pageX, _pageY);
            }).catch(() => {
                const _rs = document.getElementById('refresh-status');
                _rs.textContent = '새로고침 실패 · 연결 상태 확인 필요';
                _rs.className = 'refresh-status error';
            });
        }

        function jumpToTable(val) {
            const id = String(val).trim();
            if (!id) return;
            if (adminViewMode === 'map') {
                selectedTableId = id;
                if (lastTablesData) renderMapMode(lastTablesData);
                return;
            }
            const card = document.querySelector(`#display [data-table-id="${id}"]`);
            if (card) card.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }

        function updateMenu(id) {
            const price = document.getElementById(`p-${id}`).value;
            const stock = document.getElementById(`s-${id}`).value;
            fetch('/api/admin/update_menu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, price, stock })
            }).then(r => r.json()).then(res => { if(res.status === 'success') refresh(); });
        }

        async function batchProcess(type, tableId, orderIds) {
            let apiPath = '';
            if (type === 'item_pay') apiPath = '/api/item_pay';
            else if (type === 'serve') apiPath = '/api/serve';
            else if (type === 'cancel') {
                if(!confirm("선택한 항목을 모두 삭제하시겠습니까?")) return;
                apiPath = '/api/cancel_order';
            }
            let failedCount = 0;
            for (const orderId of orderIds) {
                try {
                    const response = await fetch(apiPath, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ table_id: tableId, order_id: orderId })
                    });
                    const data = await response.json().catch(() => null);
                    if (!response.ok || !data || data.status !== 'success') failedCount += 1;
                } catch (_) {
                    failedCount += 1;
                }
            }
            refresh();
            if (failedCount > 0) {
                alert(failedCount === 1
                    ? "처리에 실패했습니다. 다시 시도해주세요."
                    : `${failedCount}건 처리에 실패했습니다. 다시 시도해주세요.`);
            }
        }

        function clearT(id) {
            if(confirm(id + '번 테이블을 비우시겠습니까?')) {
                fetch('/api/clear', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({table_id:id})
                }).then(async response => {
                    const data = await response.json().catch(() => null);
                    if (!response.ok || !data || data.status !== 'success') {
                        alert("테이블 초기화에 실패했습니다. 다시 시도해주세요.");
                        return;
                    }
                    refresh();
                }).catch(() => {
                    alert("테이블 초기화에 실패했습니다. 다시 시도해주세요.");
                });
            }
        }

        function downloadSales() {
            window.location.href = '/api/admin/export_sales';
        }

        function confirmReset() {
            const code = prompt(
                '⚠️ 경고: 모든 주문 내역, 매출, 판매 통계가 초기화됩니다.\n' +
                '이 작업은 되돌릴 수 없습니다.\n\n' +
                '계속하려면 RESET을 입력하세요.'
            );
            if (code === null) return;
            if (code !== 'RESET') {
                alert('입력한 코드가 올바르지 않습니다. 초기화가 취소되었습니다.');
                return;
            }
            fetch('/api/admin/reset_operation_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ confirm: 'RESET' })
            })
            .then(r => r.json())
            .then(data => {
                if (data.status === 'success') {
                    alert('✅ 테스트 데이터가 초기화되었습니다. 페이지를 새로고침합니다.');
                    location.reload();
                } else {
                    alert('❌ 초기화에 실패했습니다: ' + (data.message || '알 수 없는 오류'));
                }
            })
            .catch(() => alert('❌ 서버 연결에 실패했습니다.'));
        }

        setInterval(refresh, REFRESH_INTERVAL_MS);
        refresh();
    </script>
</body>
</html>
