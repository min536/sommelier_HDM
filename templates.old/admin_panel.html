<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>소믈리에 주점 | 통합 관리</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@500;600;700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;1,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --wine: #862633;
            --wine-deep: #5C1A22;
            --gold: #B8924A;
            --gold-soft: #D4B574;
            --cream: #FAF6F0;
            --paper: #FFFCF7;
            --ink: #1A1A1A;
            --muted: #7A7068;
            --rule: #E8DFD0;
            --rule-strong: #D6CAB3;
            --success: #2D6A4F;
            --success-soft: #E8F0EB;
            --alert: #C53030;
            --alert-soft: #FCEAEA;
        }
        * { box-sizing: border-box; }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background: var(--cream);
            margin: 0; padding: 28px;
            color: var(--ink);
            -webkit-font-smoothing: antialiased;
        }

        /* ───── MOBILE ───── */
        @media (max-width: 720px) {
            body { padding: 14px; }
            .header {
                padding: 20px 20px;
                grid-template-columns: 1fr;
                gap: 18px;
            }
            .h-brand { font-size: 22px; }
            .h-kpis { gap: 0; }
            .kpi {
                text-align: left;
                padding-left: 0;
                border-left: none;
                border-top: 1px solid var(--rule);
                padding-top: 14px;
                min-width: 0;
            }
            .kpi-val { font-size: 24px; }
            .section { margin: 28px 0 14px; }
            .section-title { font-size: 16px; }
            #display { grid-template-columns: 1fr; gap: 14px; }
            .card-top { padding: 16px 16px 12px; }
            .table-num { font-size: 17px; }
            .bill { padding: 12px 16px; }
            .bill-amt { font-size: 19px; }
            .order-list { padding: 4px 16px 12px; }
            .card-foot { padding: 0 16px 16px; }
            .clear-btn { padding: 13px; font-size: 13px; }
            .mini-btn { padding: 7px 11px; font-size: 12px; }
            /* Menu table → horizontal scroll on mobile */
            .panel { overflow-x: auto; -webkit-overflow-scrolling: touch; }
            .menu-table { min-width: 540px; }
            .menu-table th, .menu-table td { padding: 12px 14px; }
            .input-sm { width: 80px; padding: 7px 9px; }
            .btn-save { padding: 8px 14px; }
            .credit { margin-top: 36px; font-size: 11px; }
        }
        @media (max-width: 380px) {
            body { padding: 10px; }
            .header { padding: 18px; }
            .h-brand { font-size: 20px; }
            .h-brand-label { font-size: 11px; letter-spacing: 0.2em; }
        }
        .serif { font-family: 'Noto Serif KR', serif; }
        .latin { font-family: 'Cormorant Garamond', serif; font-style: italic; }

        /* ───── HEADER ───── */
        .header {
            background: var(--paper);
            border: 1px solid var(--rule);
            border-top: 3px solid var(--wine);
            padding: 26px 32px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }
        .h-brand-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            letter-spacing: 0.25em;
            color: var(--gold);
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .h-brand {
            font-family: 'Noto Serif KR', serif;
            font-weight: 900;
            font-size: 26px;
            color: var(--wine-deep);
            letter-spacing: 0.02em;
        }
        .h-kpis { display: flex; gap: 28px; align-items: stretch; }
        .kpi {
            text-align: right;
            padding-left: 28px;
            border-left: 1px solid var(--rule);
            min-width: 140px;
        }
        .kpi-label {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            margin-bottom: 6px;
        }
        .kpi-val {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 26px;
            color: var(--wine-deep);
            letter-spacing: 0.01em;
        }
        .kpi-val .krw {
            font-family: 'Pretendard', sans-serif;
            font-size: 12px;
            color: var(--muted);
            margin-left: 4px;
            font-weight: 500;
            letter-spacing: 0.1em;
        }

        /* ───── SECTION TITLE ───── */
        .section {
            display: flex; align-items: baseline; gap: 14px;
            margin: 40px 0 18px;
        }
        .section-num {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 20px;
            color: var(--gold);
        }
        .section-title {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 18px;
            color: var(--ink);
        }
        .section-rule { flex: 1; height: 1px; background: var(--rule); }
        .section-meta { font-family: 'Cormorant Garamond', serif; font-style: italic; font-size: 13px; color: var(--muted); }

        /* ───── TABLE CARDS ───── */
        #display {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 18px;
        }
        .card {
            background: var(--paper);
            border: 1px solid var(--rule);
            padding: 0;
            display: flex; flex-direction: column;
            position: relative;
        }
        .card-top {
            display: flex; justify-content: space-between; align-items: baseline;
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--rule);
        }
        .table-num {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700;
            font-size: 20px;
            color: var(--ink);
        }
        .table-num .latin-no {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--gold);
            margin-right: 6px;
            letter-spacing: 0.15em;
        }
        .table-time {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 13px;
            color: var(--muted);
        }
        /* Status accent strip */
        .card::before {
            content: '';
            position: absolute; top: 0; left: 0; bottom: 0;
            width: 3px; background: var(--gold);
        }
        .card.all-paid::before { background: var(--success); }
        .card.long-stay::before { background: var(--alert); animation: pulse 1.6s ease-in-out infinite; }
        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

        .pill {
            display: inline-block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.2em;
            padding: 3px 10px;
            border-radius: 999px;
            text-transform: uppercase;
            margin-left: 8px;
        }
        .pill-pending { background: #FAF0E0; color: #8A6A2E; }
        .pill-paid    { background: var(--success-soft); color: var(--success); }
        .pill-stay    { background: var(--alert-soft); color: var(--alert); }

        .bill {
            padding: 14px 20px;
            display: flex; justify-content: space-between; align-items: baseline;
            border-bottom: 1px solid var(--rule);
        }
        .bill-label {
            font-family: 'Cormorant Garamond', serif; font-style: italic;
            font-size: 12px; letter-spacing: 0.2em; color: var(--muted); text-transform: uppercase;
        }
        .bill-amt {
            font-family: 'Noto Serif KR', serif;
            font-weight: 700; font-size: 22px; color: var(--alert);
            letter-spacing: 0.01em;
        }
        .all-paid .bill-amt { color: var(--success); }
        .bill-amt .krw { font-family: 'Pretendard'; font-size: 11px; color: var(--muted); margin-left: 3px; font-weight: 500; letter-spacing: 0.1em; }

        .order-list { padding: 6px 20px 14px; max-height: 220px; overflow-y: auto; }
        .order-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 10px 0; border-bottom: 1px dotted var(--rule);
            font-size: 13.5px;
        }
        .order-row:last-child { border-bottom: none; }
        .order-row.done { opacity: 0.42; }
        .order-name { font-weight: 600; color: var(--ink); }
        .order-count {
            display: inline-block;
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            background: var(--wine);
            color: var(--paper);
            padding: 1px 8px;
            font-size: 12px;
            letter-spacing: 0.05em;
            margin-left: 6px;
            border-radius: 999px;
        }
        .btn-group { display: flex; gap: 6px; }
        .mini-btn {
            font-family: 'Pretendard', sans-serif;
            font-size: 11.5px;
            font-weight: 600;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            color: var(--ink);
            padding: 5px 10px;
            cursor: pointer;
            letter-spacing: 0.02em;
            transition: all 0.15s ease;
        }
        .mini-btn:hover { background: var(--cream); }
        .mini-btn.pay { color: var(--wine); border-color: var(--wine); }
        .mini-btn.pay.is-paid { background: var(--success); color: white; border-color: var(--success); }
        .mini-btn.serve { color: var(--ink); }
        .mini-btn.serve.is-done { color: var(--muted); }
        .mini-btn.del { color: var(--muted); padding: 5px 8px; }
        .mini-btn.del:hover { color: var(--alert); border-color: var(--alert); }

        .card-foot { padding: 0 20px 18px; margin-top: auto; }
        .clear-btn {
            width: 100%;
            font-family: 'Noto Serif KR', serif;
            font-weight: 600;
            background: var(--ink);
            color: var(--paper);
            border: none;
            padding: 12px;
            cursor: pointer;
            letter-spacing: 0.1em;
            font-size: 13px;
            transition: background 0.15s;
        }
        .clear-btn:hover { background: var(--wine-deep); }

        /* ───── MENU TABLE ───── */
        .panel {
            background: var(--paper);
            border: 1px solid var(--rule);
            padding: 0;
        }
        .menu-table { width: 100%; border-collapse: collapse; }
        .menu-table th {
            background: var(--cream);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-weight: 500;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
            text-align: left;
            padding: 14px 20px;
            border-bottom: 1px solid var(--rule);
        }
        .menu-table td {
            padding: 14px 20px;
            border-bottom: 1px solid var(--rule);
            font-size: 14px;
            vertical-align: middle;
        }
        .menu-table tr:last-child td { border-bottom: none; }
        .menu-table tr:hover td { background: rgba(184,146,74,0.04); }
        .menu-name-cell { font-family: 'Noto Serif KR', serif; font-weight: 600; }
        .cat-tag {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 11px;
            letter-spacing: 0.18em;
            color: var(--gold);
            text-transform: uppercase;
        }
        .input-sm {
            width: 100px;
            padding: 8px 10px;
            border: 1px solid var(--rule-strong);
            background: var(--paper);
            font-family: 'Pretendard', sans-serif;
            font-weight: 600;
            font-size: 13px;
            color: var(--ink);
        }
        .input-sm:focus { outline: none; border-color: var(--gold); }
        .btn-save {
            font-family: 'Noto Serif KR', serif;
            background: var(--wine);
            color: var(--paper);
            border: none;
            padding: 8px 16px;
            cursor: pointer;
            font-weight: 600;
            font-size: 12.5px;
            letter-spacing: 0.08em;
            transition: background 0.15s;
        }
        .btn-save:hover { background: var(--wine-deep); }

        /* ───── FOOTER CREDIT ───── */
        .credit {
            text-align: center;
            margin-top: 48px;
            padding-top: 24px;
            border-top: 1px solid var(--rule);
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 12px;
            letter-spacing: 0.2em;
            color: var(--muted);
            text-transform: uppercase;
        }
    </style>
</head>
<body>

<script>
// 이미지 로드 실패 핸들러 (메뉴 이미지가 깨질 때 우아한 처리)
window.addEventListener('error', function(e){
    if(e.target.tagName !== 'IMG') return;
    e.target.style.display = 'none';
}, true);
</script>

    <div class="header">
        <div>
            <div class="h-brand-label">Sommelier · Operations</div>
            <div class="h-brand">소믈리에 주점 통합 관리</div>
        </div>
        <div class="h-kpis">
            <div class="kpi">
                <div class="kpi-label">Cumulative Revenue</div>
                <div class="kpi-val"><span id="total-rev">0</span><span class="krw">KRW</span></div>
            </div>
        </div>
    </div>

    <div class="section">
        <span class="section-num">01</span>
        <span class="section-title">테이블 실시간 현황</span>
        <span class="section-rule"></span>
        <span class="section-meta">Live · 5s</span>
    </div>
    <div id="display"></div>

    <div class="section">
        <span class="section-num">02</span>
        <span class="section-title">메뉴 및 재고 관리</span>
        <span class="section-rule"></span>
        <span class="section-meta">Menu &amp; Stock</span>
    </div>
    <div class="panel">
        <table class="menu-table">
            <thead>
                <tr>
                    <th>Item</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th style="text-align:right;">Action</th>
                </tr>
            </thead>
            <tbody id="menu-management-list"></tbody>
        </table>
    </div>

    <div class="credit">— System designed by 동민 · 창식 —</div>

    <script>
        function refresh() {
            fetch('/api/orders').then(r => r.json()).then(res => {
                document.getElementById('total-rev').innerText = res.cumulative_revenue.toLocaleString();

                const menuList = document.getElementById('menu-management-list');
                menuList.innerHTML = res.menu.map(m => `
                    <tr>
                        <td class="menu-name-cell">${m.name}${m.is_alcohol ? ' <span class="cat-tag" style="margin-left:6px;">Wine</span>' : ''}</td>
                        <td><span class="cat-tag">${m.category}</span></td>
                        <td><input type="number" id="p-${m.id}" class="input-sm" value="${m.price}"></td>
                        <td><input type="number" id="s-${m.id}" class="input-sm" value="${m.stock}"></td>
                        <td style="text-align:right;"><button class="btn-save" onclick="updateMenu(${m.id})">APPLY</button></td>
                    </tr>
                `).join('');

                const container = document.getElementById('display');
                container.innerHTML = '';

                Object.keys(res.tables).sort((a,b)=>Number(a)-Number(b)).forEach(id => {
                    const info = res.tables[id];
                    const diffMins = Math.floor((new Date() - new Date(info.entry_time)) / 60000);
                    const isLongStay = diffMins >= 120;
                    const isAllPaid = info.remaining_bill === 0;

                    const groupedOrders = info.orders.reduce((acc, o, idx) => {
                        const key = `${o.menu_name}_${o.status}_${o.is_paid}`;
                        if (!acc[key]) acc[key] = { ...o, count: 0, indices: [] };
                        acc[key].count += 1;
                        acc[key].indices.push(idx);
                        return acc;
                    }, {});

                    const card = document.createElement('div');
                    card.className = `card ${isAllPaid ? 'all-paid' : ''} ${isLongStay ? 'long-stay' : ''}`;

                    let pill = '';
                    if (isLongStay) pill = '<span class="pill pill-stay">Long stay</span>';
                    else if (isAllPaid) pill = '<span class="pill pill-paid">Paid</span>';
                    else pill = '<span class="pill pill-pending">Pending</span>';

                    let html = `
                        <div class="card-top">
                            <div class="table-num"><span class="latin-no">No.</span>${id}번 테이블${pill}</div>
                            <div class="table-time">${diffMins}m</div>
                        </div>
                        <div class="bill">
                            <span class="bill-label">${isAllPaid ? 'Settled' : 'Remaining'}</span>
                            <span class="bill-amt">${info.remaining_bill.toLocaleString()}<span class="krw">KRW</span></span>
                        </div>
                        <div class="order-list">`;

                    Object.values(groupedOrders).forEach(group => {
                        const isDone = group.status === '서빙 완료';
                        const idxList = JSON.stringify(group.indices);
                        html += `
                            <div class="order-row ${isDone?'done':''}">
                                <div>
                                    <span class="order-name">${group.menu_name}</span>
                                    <span class="order-count">× ${group.count}</span>
                                </div>
                                <div class="btn-group">
                                    <button class="mini-btn pay ${group.is_paid?'is-paid':''}" onclick='batchProcess("item_pay", "${id}", ${idxList})'>
                                        ${group.is_paid?'완료':'입금'}
                                    </button>
                                    <button class="mini-btn serve ${isDone?'is-done':''}" onclick='batchProcess("serve", "${id}", ${idxList})'>
                                        ${isDone?'취소':'서빙'}
                                    </button>
                                    <button class="mini-btn del" onclick='batchProcess("cancel", "${id}", ${idxList})'>×</button>
                                </div>
                            </div>`;
                    });

                    html += `</div>
                        <div class="card-foot">
                            <button class="clear-btn" onclick="clearT('${id}')">테이블 비우기 · Clear</button>
                        </div>`;
                    card.innerHTML = html;
                    container.appendChild(card);
                });
            }).catch(()=>{});
        }

        function updateMenu(id) {
            const price = document.getElementById(`p-${id}`).value;
            const stock = document.getElementById(`s-${id}`).value;
            fetch('/api/admin/update_menu', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, price, stock })
            }).then(r => r.json()).then(res => { if(res.status === 'success') refresh(); });
        }

        async function batchProcess(type, tableId, indices) {
            let apiPath = '';
            if (type === 'item_pay') apiPath = '/api/item_pay';
            else if (type === 'serve') apiPath = '/api/serve';
            else if (type === 'cancel') {
                if(!confirm("선택한 항목을 모두 삭제하시겠습니까?")) return;
                apiPath = '/api/cancel_order';
                indices.sort((a,b) => b-a);
            }
            for (const idx of indices) {
                await fetch(apiPath, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ table_id: tableId, order_idx: idx })
                });
            }
            refresh();
        }

        function clearT(id) {
            if(confirm(id + '번 테이블을 비우시겠습니까?')) {
                fetch('/api/clear', {method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({table_id:id})}).then(refresh);
            }
        }

        setInterval(refresh, 5000);
        refresh();
    </script>
</body>
</html>
